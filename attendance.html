<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>준회원 출석체크 — 제37회 서울남연회</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a;
  --border:#2e3250; --accent:#4f7cff; --gold:#f0b429;
  --green:#34d399; --red:#f87171; --text:#e8eaf6;
  --text2:#9ba3c4; --text3:#6b7399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:13px;padding-bottom:40px;}

.header{background:#1a1d27;border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100;}
.header h1{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;color:var(--text3);margin-top:3px;}

.stab-wrap{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
.stab-wrap::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--text3);transition:all .2s;line-height:1.4;text-align:center;}
.stab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.stab.d2{border-color:rgba(240,180,41,.4);}
.stab.d2.active{background:var(--gold);border-color:var(--gold);color:#1a1d27;}

.prog-bar{padding:8px 12px;background:var(--surface);display:flex;align-items:center;gap:8px;}
.prog-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .3s;}
.prog-text{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap;}

.container{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}

/* 그룹 섹션 */
.grp{border-radius:12px;overflow:hidden;border:1px solid var(--border);}

/* ★ 헤더만 pointer, body는 이벤트 없음 */
.grp-hdr{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
}
.grp-hdr:active{background:rgba(255,255,255,.03);}
.grp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.g-heoip .grp-dot{background:#1a4fa0;}
.g-jun1  .grp-dot{background:#0e7f4e;}
.g-jun2  .grp-dot{background:#7b2d9e;}
.grp-title{font-size:14px;font-weight:700;flex:1;}
.g-heoip .grp-title{color:#60a5fa;}
.g-jun1  .grp-title{color:#4ade80;}
.g-jun2  .grp-title{color:#c084fc;}
.grp-count{font-size:11px;color:var(--text3);}
.grp-chevron{color:var(--text3);font-size:15px;transition:transform .25s;}
.grp.open .grp-chevron{transform:rotate(180deg);}

/* 바디 — pointer-events 없음, 클릭해도 헤더로 안 감 */
.grp-body{display:none;border-top:1px solid var(--border);}
.grp.open .grp-body{display:block;}

.sess-hdr{padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sess-label{font-size:11px;font-weight:700;color:var(--text2);}
.sess-stats{font-size:11px;color:var(--green);}

.bulk-row{display:flex;gap:6px;padding:8px 10px 4px;}
.bulk-btn{flex:1;padding:6px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.bulk-btn:active{transform:scale(.97);}
.btn-all{background:rgba(52,211,153,.15);color:var(--green);}
.btn-clr{background:rgba(248,113,113,.1);color:var(--text3);}

.attend-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:10px;}

/* ★ attend-item — cursor:pointer, 내부 자식들 pointer-events:none */
.attend-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--surface2);border-radius:8px;
  border:1px solid transparent;transition:all .15s;
  cursor:pointer;
}
.attend-item:active{opacity:.7;}
.attend-item.present{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3);}
.attend-item.absent {background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);}

/* ★ 자식 모두 pointer-events:none → 클릭이 item에서만 잡힘 */
.attend-item *{pointer-events:none;}

.a-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);transition:all .15s;}
.attend-item.present .a-dot{background:var(--green);border-color:var(--green);}
.attend-item.absent  .a-dot{background:var(--red);  border-color:var(--red);}
.a-info{flex:1;min-width:0;}
.a-name{font-size:12px;font-weight:700;color:var(--text);}
.a-church{font-size:10px;color:var(--text3);}
.a-num{font-size:10px;color:var(--text3);margin-left:auto;}
</style>
</head>
<body>

<div class="header">
  <h1>준회원 출석체크</h1>
  <div class="header-sub">제37회 서울남연회 · 광림교회 · 담당: 안성민 목사</div>
</div>

<div class="stab-wrap" id="stab-wrap">
  <div class="stab active" data-s="d1s1">9일 1회집<br><small>09:00</small></div>
  <div class="stab"        data-s="d1s2">9일 2회집<br><small>14:00</small></div>
  <div class="stab"        data-s="d1s3">9일 저녁<br><small>17:30</small></div>
  <div class="stab d2"     data-s="d2s1">10일 1회집<br><small>09:30</small></div>
  <div class="stab d2"     data-s="d2s2">10일 2회집<br><small>12:00</small></div>
  <div class="stab d2"     data-s="d2s3">10일 안수식<br><small>14:30</small></div>
</div>

<div class="prog-bar">
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-text" id="prog-text">0 / 0</div>
</div>

<div class="container" id="container"></div>

<script>
const SL = {
  d1s1:'4/9 제1회집 (09:00)', d1s2:'4/9 제2회집 (14:00)', d1s3:'4/9 저녁 (17:30)',
  d2s1:'4/10 제3회집 (09:30)', d2s2:'4/10 사무처리5 (12:00)', d2s3:'4/10 목사안수식 (14:30)'
};
const SESSIONS = ['d1s1','d1s2','d1s3','d2s1','d2s2','d2s3'];

const GROUPS = [
  { key:'heoip', cls:'g-heoip', label:'허 입', members:[
    {n:1,name:'오세빛',ch:'영등포중앙'},{n:2,name:'오의택',ch:'은총'},
    {n:3,name:'오예문',ch:'새광명'},{n:4,name:'박선수',ch:'구로동'},
    {n:5,name:'이호용',ch:'숨빛청파'},{n:6,name:'박삼수',ch:'생명누리'},
    {n:7,name:'천다솔',ch:'한사랑'},{n:8,name:'최정순',ch:'새터'},
    {n:9,name:'송신영',ch:'광림'},{n:10,name:'임재순',ch:'광림'},
    {n:11,name:'조창원',ch:'개포'},{n:12,name:'김성훈',ch:'강남성은'},
    {n:13,name:'윤성민',ch:'빛'},{n:14,name:'문성환',ch:'빛'},
    {n:15,name:'김승배',ch:'수표교'},{n:16,name:'박민희',ch:'브니엘'},
  ]},
  { key:'jun1', cls:'g-jun1', label:'준 1', members:[
    {n:1,name:'최정문',ch:'대림'},{n:2,name:'박다샘',ch:'대림'},
    {n:3,name:'김재성',ch:'영도'},{n:4,name:'지성현',ch:'예닮'},
    {n:5,name:'임동원',ch:'베다니'},{n:6,name:'문주훈',ch:'염창'},
    {n:7,name:'이범두',ch:'선민'},{n:8,name:'권예찬',ch:'화곡동'},
    {n:9,name:'김형통',ch:'한사랑'},{n:10,name:'이주복',ch:'한사랑'},
    {n:11,name:'윤민정',ch:'광림'},{n:12,name:'남준혁',ch:'광림'},
    {n:13,name:'김관욱',ch:'큰믿음유신'},{n:14,name:'김성한',ch:'새노래'},
    {n:15,name:'강영구',ch:'염창'},{n:16,name:'유심원',ch:'광림'},
    {n:17,name:'막먀르수렝',ch:'광림'},
  ]},
  { key:'jun2', cls:'g-jun2', label:'준 2', members:[
    {n:1,name:'방건석',ch:'영등포중앙'},{n:2,name:'황국진',ch:'양남'},
    {n:3,name:'윤성일',ch:'문래동'},{n:4,name:'김목',ch:'베다니'},
    {n:5,name:'김은사',ch:'베다니'},{n:6,name:'김광현',ch:'오류동'},
    {n:7,name:'이준영',ch:'평안'},{n:8,name:'윤민섭',ch:'영흥'},
    {n:9,name:'김성민',ch:'금성'},{n:10,name:'한준구',ch:'광림'},
    {n:11,name:'박지훈',ch:'광림'},{n:12,name:'안성은',ch:'광복'},
    {n:13,name:'윤수빈',ch:'서울연합'},{n:14,name:'배진',ch:'안디옥'},
    {n:15,name:'박재훈',ch:'내삶이예배'},{n:16,name:'한아름',ch:'남산'},
    {n:17,name:'이예은',ch:'서초중앙'},{n:18,name:'유혜준',ch:'참평안'},
    {n:19,name:'박하늘',ch:'관악'},{n:20,name:'최성겸',ch:'큰믿음유신'},
    {n:21,name:'김진혁',ch:'예광'},{n:22,name:'조덕희',ch:'강남중앙'},
    {n:23,name:'김홍기',ch:'성현'},{n:24,name:'오미일',ch:'좋은샘'},
    {n:25,name:'김은기',ch:'뉴질랜드광림'},{n:26,name:'이다니엘',ch:'뉴질랜드광림'},
  ]},
];

// 상태
let cur = 'd1s1';
let state = {};
SESSIONS.forEach(s => { state[s]={}; GROUPS.forEach(g => { state[s][g.key]={}; }); });

function load(){try{const d=localStorage.getItem('ny37v3');if(d)state=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem('ny37v3',JSON.stringify(state));}catch(e){}}

function toggle(s,gKey,n){
  const v=state[s][gKey][n];
  state[s][gKey][n] = !v?'present':v==='present'?'absent':null;
  save();
  // 해당 item만 업데이트
  const el=document.querySelector(`.attend-item[data-id="${s}_${gKey}_${n}"]`);
  if(el){el.className='attend-item'+(state[s][gKey][n]?' '+state[s][gKey][n]:'');}
  updateStats(gKey);
  updateProg();
}

function bulk(s,gKey,val){
  GROUPS.find(g=>g.key===gKey).members.forEach(m=>{ state[s][gKey][m.n]=val||null; });
  save(); render();
}

function updateStats(gKey){
  const g=GROUPS.find(g=>g.key===gKey);
  const p=g.members.filter(m=>state[cur][gKey][m.n]==='present').length;
  const a=g.members.filter(m=>state[cur][gKey][m.n]==='absent').length;
  const q=g.members.length-p-a;
  const el=document.querySelector(`[data-stats="${gKey}"]`);
  if(el)el.textContent=`✓${p} ✗${a} ?${q}`;
  const ce=document.querySelector(`[data-count="${gKey}"]`);
  if(ce)ce.textContent=`출석 ${p} / 결석 ${a}`;
}

function updateProg(){
  let tot=0,pr=0;
  GROUPS.forEach(g=>g.members.forEach(m=>{tot++;if(state[cur][g.key][m.n]==='present')pr++;}));
  const pct=tot?Math.round(pr/tot*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`출석 ${pr} / ${tot}`;
}

function render(){
  const c=document.getElementById('container');
  c.innerHTML='';

  GROUPS.forEach(g=>{
    const p=g.members.filter(m=>state[cur][g.key][m.n]==='present').length;
    const a=g.members.filter(m=>state[cur][g.key][m.n]==='absent').length;

    // 섹션
    const sec=document.createElement('div');
    sec.className=`grp ${g.cls}`;

    // ★ 헤더 — addEventListener로만 접기/펼치기
    const hdr=document.createElement('div');
    hdr.className='grp-hdr';
    hdr.innerHTML=`
      <div class="grp-dot"></div>
      <div class="grp-title">${g.label} (${g.members.length}명)</div>
      <div class="grp-count" data-count="${g.key}">출석 ${p} / 결석 ${a}</div>
      <div class="grp-chevron">▾</div>`;
    hdr.addEventListener('click', ()=>sec.classList.toggle('open'));
    sec.appendChild(hdr);

    // 바디
    const body=document.createElement('div');
    body.className='grp-body';

    // 세션 헤더
    const sh=document.createElement('div');
    sh.className='sess-hdr';
    sh.innerHTML=`<span class="sess-label">${SL[cur]}</span><span class="sess-stats" data-stats="${g.key}">✓${p} ✗${a} ?${g.members.length-p-a}</span>`;
    body.appendChild(sh);

    // 일괄 버튼
    const br=document.createElement('div');
    br.className='bulk-row';
    const b1=document.createElement('button');
    b1.className='bulk-btn btn-all';b1.textContent='전원 출석';
    b1.addEventListener('click',()=>bulk(cur,g.key,'present'));
    const b2=document.createElement('button');
    b2.className='bulk-btn btn-clr';b2.textContent='초기화';
    b2.addEventListener('click',()=>bulk(cur,g.key,null));
    br.appendChild(b1);br.appendChild(b2);
    body.appendChild(br);

    // 그리드
    const grid=document.createElement('div');
    grid.className='attend-grid';

    g.members.forEach(m=>{
      const st=state[cur][g.key][m.n]||'';
      const item=document.createElement('div');
      item.className='attend-item'+(st?' '+st:'');
      item.setAttribute('data-id',`${cur}_${g.key}_${m.n}`);
      // ★ 자식에 pointer-events:none이 걸려 있으므로
      //   클릭은 무조건 item에서 발생 → stopPropagation 불필요
      item.innerHTML=`
        <div class="a-dot"></div>
        <div class="a-info">
          <div class="a-name">${m.name}</div>
          <div class="a-church">${m.ch}</div>
        </div>
        <div class="a-num">${m.n}</div>`;
      item.addEventListener('click',()=>toggle(cur,g.key,m.n));
      grid.appendChild(item);
    });

    body.appendChild(grid);
    sec.appendChild(body);
    c.appendChild(sec);
  });

  // 첫 그룹 열기
  const first=c.querySelector('.grp');
  if(first)first.classList.add('open');

  updateProg();
}

// 탭 클릭
document.getElementById('stab-wrap').addEventListener('click', e=>{
  const tab=e.target.closest('[data-s]');
  if(!tab)return;
  cur=tab.dataset.s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  render();
});

load();
render();
</script>
</body>
</html>
